---
layout: default
---
<article class="post">
  <header class="post__header">
    <h1>{{ page.title }}</h1>
    <div class="post__meta">
      <time class="post__date" datetime="{{ page.date | date_to_xmlschema }}">
        {{- page.git_date | date: "%Y-%m-%d %H:%M" | default: page.date | date: "%Y-%m-%d %H:%M" -}}
      </time>
      {% if page.git_author %}
      <span class="post__author">{{ page.git_author }}</span>
      {% endif %}
    </div>
  </header>
  <div class="post__body">
    {{ content }}
  </div>
</article>
