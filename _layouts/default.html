<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    <script>
      (function () {
        const root = document.documentElement;
        const saved = localStorage.getItem("theme");
        const preferred = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        root.dataset.theme = saved || preferred;
        const accent = localStorage.getItem("accent");
        if (accent && accent !== "default") root.style.setProperty("--accent", accent);
      })();
    </script>
    {% feed_meta %}
  </head>
  <body>
    <div class="chrome">
      <aside class="chrome__sidebar">
        <a class="sidebar__item sidebar__brand" href="{{ "/" | relative_url }}">
          <img src="{{ "/assets/img/logo-dark.svg" | relative_url }}" alt="{{ site.title }}" class="sidebar__logo">
        </a>
        <nav class="sidebar__nav">
          <a class="sidebar__item{% if page.url == "/" %} active{% endif %}" href="{{ "/" | relative_url }}">Home</a>
          <a class="sidebar__item{% if page.url contains "/music" %} active{% endif %}" href="{{ "/music" | relative_url }}">Music</a>
          <a class="sidebar__item{% if page.url contains "/programming" %} active{% endif %}" href="{{ "/programming" | relative_url }}">Programming</a>
          <a class="sidebar__item{% if page.url contains "/projects" %} active{% endif %}" href="{{ "/projects" | relative_url }}">Projects</a>
          <a class="sidebar__item{% if page.url contains "/about" %} active{% endif %}" href="{{ "/about" | relative_url }}">Apropos</a>
          <div class="sidebar__item sidebar__social">
            {% if site.github_username %}
            <a href="https://github.com/{{ site.github_username }}" aria-label="GitHub" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
            {% endif %}
            {% if site.youtube_username %}
            <a href="https://youtube.com/@{{ site.youtube_username }}" aria-label="YouTube" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.495 6.205a3.007 3.007 0 00-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 00.527 6.205a31.247 31.247 0 00-.522 5.805 31.247 31.247 0 00.522 5.783 3.007 3.007 0 002.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 002.088-2.088 31.247 31.247 0 00.5-5.783 31.247 31.247 0 00-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
            </a>
            {% endif %}
            {% if site.linkedin_username %}
            <a href="https://linkedin.com/in/{{ site.linkedin_username }}" aria-label="LinkedIn" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
            {% endif %}
            {% if site.reddit_username %}
            <a href="https://reddit.com/user/{{ site.reddit_username }}" aria-label="Reddit" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.687-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>
            </a>
            {% endif %}
          </div>
          <div class="sidebar__item sidebar__palette">
            <button class="palette__bullet" data-color="#e06c75" style="--bullet-color: #e06c75" aria-label="Red"></button>
            <button class="palette__bullet" data-color="#e5956a" style="--bullet-color: #e5956a" aria-label="Orange"></button>
            <button class="palette__bullet" data-color="#e5c07b" style="--bullet-color: #e5c07b" aria-label="Yellow"></button>
            <button class="palette__bullet" data-color="#98c379" style="--bullet-color: #98c379" aria-label="Green"></button>
            <button class="palette__bullet" data-color="#56b6c2" style="--bullet-color: #56b6c2" aria-label="Teal"></button>
            <button class="palette__bullet" data-color="#89b4fa" style="--bullet-color: #89b4fa" aria-label="Blue"></button>
            <button class="palette__bullet" data-color="#c678dd" style="--bullet-color: #c678dd" aria-label="Purple"></button>
            <button class="palette__bullet palette__bullet--split" data-color="default" aria-label="Default"></button>
          </div>
        </nav>
        <p class="sidebar__item sidebar__copyright">2022 &mdash; 2026, Danilo Guimaraes</p>
      </aside>
      <main class="chrome__content">
        {{ content }}
      </main>
    </div>
    <script>
      (function () {
        const root = document.documentElement;
        const defaultAccent = "#89b4fa";
        const colorBullets = document.querySelectorAll(".palette__bullet:not(.palette__bullet--split)");
        const splitBullet = document.querySelector(".palette__bullet--split");

        function applyAccent(color) {
          root.style.setProperty("--accent", color === "default" ? defaultAccent : color);
        }

        function selectBullet(color) {
          colorBullets.forEach(function (b) {
            b.classList.toggle("selected", b.dataset.color === color);
          });
        }

        const savedColor = localStorage.getItem("accent") || "default";
        applyAccent(savedColor);
        selectBullet(savedColor);

        colorBullets.forEach(function (bullet) {
          bullet.addEventListener("click", function () {
            const color = bullet.dataset.color;
            localStorage.setItem("accent", color);
            applyAccent(color);
            selectBullet(color);
          });
        });

        splitBullet.addEventListener("click", function () {
          const next = root.dataset.theme === "dark" ? "light" : "dark";
          localStorage.setItem("theme", next);
          root.dataset.theme = next;
        });
      })();
    </script>
  </body>
</html>
